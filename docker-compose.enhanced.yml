# Enhanced RAG Stack with Recursive Web Crawling
# Complete orchestration for the enhanced RAG system
version: '3.8'

services:
  # PostgreSQL with PGVector for embeddings
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector-enhanced
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama-enhanced
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - rag-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # LlamaStack orchestration layer  
  llamastack:
    image: llamastack/llamastack:latest
    container_name: rag-llamastack-enhanced
    ports:
      - "8321:8321"
    environment:
      - PGVECTOR_HOST=pgvector
      - PGVECTOR_PORT=5432
      - PGVECTOR_DB=ragdb
      - PGVECTOR_USER=raguser
      - PGVECTOR_PASSWORD=ragpassword
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      pgvector:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./deploy/local/stack-config.yaml:/app/config.yaml:ro
    networks:
      - rag-network
    restart: unless-stopped

  # Enhanced Ingestion Service with Web Crawling
  rag-ingestion-enhanced:
    build:
      context: .
      dockerfile: ingestion-service/Containerfile.production
    container_name: rag-ingestion-enhanced
    environment:
      - INGESTION_CONFIG=/config/ingestion-config.yaml
      - LOG_LEVEL=INFO
      - MAX_WORKERS=4
      - CRAWL_DELAY=1.0
      - MAX_PAGES=100
      - PGVECTOR_HOST=pgvector
      - LLAMASTACK_URL=http://llamastack:8321
    volumes:
      - ./ingestion-config-crawl-demo.yaml:/config/ingestion-config.yaml:ro
      - ingestion_logs:/app/logs
      - ingestion_cache:/app/temp
    depends_on:
      llamastack:
        condition: service_started
      pgvector:
        condition: service_healthy
    networks:
      - rag-network
    restart: "no"  # Run once for ingestion
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # RAG UI (Streamlit)
  rag-ui:
    build:
      context: .
      dockerfile: frontend/Containerfile
    container_name: rag-ui-enhanced
    ports:
      - "8501:8501"
    environment:
      - LLAMASTACK_URL=http://llamastack:8321
      - RAG_QUESTION_SUGGESTIONS=|
        {
          "python-docs-crawled-v1-0": [
            "How do I create a Python class?",
            "What are Python decorators?",
            "How does exception handling work?",
            "What is list comprehension?"
          ],
          "company-kb-crawled-v1-0": [
            "What is our vacation policy?",
            "How do I submit expenses?",
            "What are the security guidelines?",
            "Where can I find HR contacts?"
          ]
        }
    depends_on:
      - llamastack
    volumes:
      - ./frontend/config:/app/config:ro
    networks:
      - rag-network
    restart: unless-stopped

  # MinIO for document storage (optional)
  minio:
    image: minio/minio:latest
    container_name: rag-minio-enhanced
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_rag_user
      MINIO_ROOT_PASSWORD: minio_rag_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - rag-network
    restart: unless-stopped

  # Web Crawler Monitor (optional utility)
  crawler-monitor:
    image: nginx:alpine
    container_name: rag-crawler-monitor
    ports:
      - "8080:80"
    volumes:
      - ingestion_logs:/usr/share/nginx/html/logs:ro
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  pgvector_data:
    driver: local
  ollama_data:
    driver: local
  minio_data:
    driver: local
  ingestion_logs:
    driver: local
  ingestion_cache:
    driver: local

networks:
  rag-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16