# Kubernetes Secrets Examples for Different RAG Deployment Options
# Apply these before deploying the Helm chart

---
# OpenAI Credentials
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: rag-system
type: Opaque
stringData:
  api-key: "sk-your-openai-api-key-here"
  
---
# Azure OpenAI Credentials  
apiVersion: v1
kind: Secret
metadata:
  name: azure-openai-credentials
  namespace: rag-system
type: Opaque
stringData:
  api-key: "your-azure-openai-api-key"
  endpoint: "https://your-resource.openai.azure.com"
  api-version: "2024-02-01"
  
---
# Confluence Integration Credentials
apiVersion: v1
kind: Secret
metadata:
  name: confluence-credentials
  namespace: rag-system
type: Opaque
stringData:
  base-url: "https://company.atlassian.net"
  username: "your-email@company.com"
  api-token: "your-confluence-api-token"
  
---
# GitHub Integration Credentials
apiVersion: v1
kind: Secret
metadata:
  name: github-credentials
  namespace: rag-system
type: Opaque
stringData:
  token: "ghp_your-github-token"
  
---
# Tavily Search API (Optional)
apiVersion: v1
kind: Secret
metadata:
  name: tavily-credentials
  namespace: rag-system
type: Opaque
stringData:
  api-key: "tvly-your-tavily-api-key"
  
---
# Hugging Face Token (for local model downloads)
apiVersion: v1
kind: Secret
metadata:
  name: huggingface-credentials
  namespace: rag-system
type: Opaque
stringData:
  token: "hf_your-huggingface-token"

---
# Azure Service Principal (for SharePoint/Azure DevOps integration)
apiVersion: v1
kind: Secret
metadata:
  name: azure-sp-credentials
  namespace: rag-system
type: Opaque
stringData:
  tenant-id: "your-azure-tenant-id"
  client-id: "your-azure-client-id"
  client-secret: "your-azure-client-secret"

---
# Database Credentials (auto-generated, but can be customized)
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: rag-system
type: Opaque
stringData:
  username: "raguser"
  password: "your-secure-db-password"
  database: "ragdb"